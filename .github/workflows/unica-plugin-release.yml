name: Build Unica Codex Plugin

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".agents/plugins/marketplace.json"
      - ".github/workflows/unica-plugin-release.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/unica-coder/**"
      - "plugins/unica/**"
      - "scripts/ci/**"
      - "scripts/install-unica.sh"
      - "scripts/install-unica.ps1"
      - "tests/ci/**"
      - "tests/fixtures/**"
      - "spec/**"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-source:
    name: Verify source guardrails
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install -r tests/ci/requirements.txt

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Test CI helper scripts
        run: python -m unittest discover -s tests/ci

      - name: Compile Python checks
        run: python -m py_compile scripts/ci/*.py tests/ci/*.py

      - name: Validate plugin JSON manifests
        run: |
          python -m json.tool plugins/unica/.codex-plugin/plugin.json >/dev/null
          python -m json.tool plugins/unica/.mcp.json >/dev/null
          python -m json.tool plugins/unica/third-party/tools.lock.json >/dev/null
          python -m json.tool plugins/unica/third-party/manifest.json >/dev/null

      - name: Check shell launchers
        run: bash -n plugins/unica/scripts/*.sh

      - name: Check PowerShell launchers
        run: pwsh -NoProfile -Command "$ErrorActionPreference = 'Stop'; Get-ChildItem plugins/unica/scripts/*.ps1 | ForEach-Object { $errors = $null; $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors); if ($errors) { throw $errors[0] } }"

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        run: cargo clippy --package unica-coder --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --package unica-coder

  build-tools:
    name: Build tools (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: verify-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build target bundle
        run: >
          python scripts/ci/build-unica-tools.py
          --target "${{ matrix.target }}"
          --lock-file "plugins/unica/third-party/tools.lock.json"
          --out-dir ".build/tool-bundles/${{ matrix.target }}"
          --work-dir ".build/tool-work/${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/tool-bundles/${{ matrix.target }}
          if-no-files-found: error

  package:
    name: Package Codex marketplace (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build-tools
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - win-x64
          - darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/tool-artifacts/unica-tools-${{ matrix.target }}

      - name: Assemble marketplace package
        run: >
          python scripts/ci/package-unica-plugin.py
          --repo-root .
          --tools-root .build/tool-artifacts
          --lock-file plugins/unica/third-party/tools.lock.json
          --out-dir dist
          --target "${{ matrix.target }}"
          --allow-partial-targets

      - name: Smoke Windows package MCP launcher
        if: matrix.target == 'win-x64'
        run: |
          pwsh -NoProfile -Command "$ErrorActionPreference = 'Stop'; $extract = '.build/win-x64-smoke'; Remove-Item -Recurse -Force $extract -ErrorAction SilentlyContinue; Expand-Archive -LiteralPath 'dist/unica-codex-marketplace-win-x64.zip' -DestinationPath $extract -Force; $mcp = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter '.mcp.json' | Select-Object -First 1; if (-not $mcp) { throw 'missing .mcp.json' }; $server = (Get-Content -LiteralPath $mcp.FullName -Raw | ConvertFrom-Json).mcpServers.unica; if ($server.command -ne 'pwsh') { throw 'win-x64 .mcp.json must use pwsh' }; if (($server.args -join ' ') -notmatch 'run-unica.ps1') { throw 'win-x64 .mcp.json must reference run-unica.ps1' }; $launcher = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter 'run-unica.ps1' | Select-Object -First 1; if (-not $launcher) { throw 'missing run-unica.ps1' }; $errors = $null; $null = [System.Management.Automation.Language.Parser]::ParseFile($launcher.FullName, [ref]$null, [ref]$errors); if ($errors) { throw $errors[0] }"

      - uses: actions/upload-artifact@v4
        with:
          name: unica-codex-marketplace-${{ matrix.target }}
          path: |
            dist/unica-codex-marketplace-${{ matrix.target }}.tar.gz
            dist/unica-codex-marketplace-${{ matrix.target }}.zip
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/unica-codex-marketplace-${{ matrix.target }}.tar.gz
            dist/unica-codex-marketplace-${{ matrix.target }}.zip

  installer:
    name: Publish installer script
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Stage installer
        run: |
          mkdir -p dist
          cp scripts/install-unica.sh dist/install-unica.sh
          cp scripts/install-unica.ps1 dist/install-unica.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: unica-installer
          path: |
            dist/install-unica.sh
            dist/install-unica.ps1
          if-no-files-found: error

      - name: Publish installer asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/install-unica.sh
            dist/install-unica.ps1
