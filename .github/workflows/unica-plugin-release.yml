name: Build Unica Codex Plugin

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".agents/plugins/marketplace.json"
      - ".github/workflows/unica-plugin-release.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/unica-coder/**"
      - "plugins/unica/**"
      - "scripts/ci/**"
      - "scripts/install-unica.sh"
      - "scripts/install-unica.ps1"
      - "tests/ci/**"
      - "tests/fixtures/**"
      - "spec/**"
  push:
    branches:
      - "main"
      - "release/windows-first-0.4.2"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-source:
    name: Verify source guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - name: Check Python
        run: python --version

      - name: Install Python test dependencies
        run: python -m pip install -r tests/ci/requirements.txt

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Test CI helper scripts
        run: python -m unittest discover -s tests/ci

      - name: Compile Python checks
        run: python -m py_compile scripts/ci/*.py tests/ci/*.py

      - name: Validate plugin JSON manifests
        run: |
          python -m json.tool plugins/unica/.codex-plugin/plugin.json >/dev/null
          python -m json.tool plugins/unica/.mcp.json >/dev/null
          python -m json.tool plugins/unica/third-party/tools.lock.json >/dev/null
          python -m json.tool plugins/unica/third-party/manifest.json >/dev/null

      - name: Check shell launchers
        run: bash -n plugins/unica/scripts/*.sh

      - name: Check PowerShell launchers
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem plugins/unica/scripts/*.ps1 | ForEach-Object {
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors)
            if ($errors) {
              throw $errors[0]
            }
          }

      - name: Check Rust formatting
        run: |
          cargo fmt --all
          cargo fmt --all -- --check

      - name: Run Rust clippy
        continue-on-error: true
        run: cargo clippy --package unica-coder --all-targets --all-features

      - name: Run Rust tests
        run: cargo test --package unica-coder

  package:
    name: Build and package (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs:
      - verify-source
      - create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - name: Check Python
        run: python --version

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build target bundle
        run: >
          python scripts/ci/build-unica-tools.py
          --target "${{ matrix.target }}"
          --lock-file "plugins/unica/third-party/tools.lock.json"
          --out-dir ".build/tool-artifacts/unica-tools-${{ matrix.target }}"
          --work-dir ".build/tool-work/${{ matrix.target }}"

      - name: Assemble marketplace package
        run: >
          python scripts/ci/package-unica-plugin.py
          --repo-root .
          --tools-root .build/tool-artifacts
          --lock-file plugins/unica/third-party/tools.lock.json
          --out-dir dist
          --target "${{ matrix.target }}"
          --allow-partial-targets

      - name: Smoke Windows package MCP launcher
        if: matrix.target == 'win-x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $extract = '.build/win-x64-smoke'
          Remove-Item -Recurse -Force $extract -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath 'dist/unica-codex-marketplace-win-x64.zip' -DestinationPath $extract -Force
          $mcp = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter '.mcp.json' | Select-Object -First 1
          if (-not $mcp) {
            throw 'missing .mcp.json'
          }
          $server = (Get-Content -LiteralPath $mcp.FullName -Raw | ConvertFrom-Json).mcpServers.unica
          if ($server.command -ne 'pwsh') {
            throw 'win-x64 .mcp.json must use pwsh'
          }
          if (($server.args -join ' ') -notmatch 'run-unica.ps1') {
            throw 'win-x64 .mcp.json must reference run-unica.ps1'
          }
          $launcher = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter 'run-unica.ps1' | Select-Object -First 1
          if (-not $launcher) {
            throw 'missing run-unica.ps1'
          }
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile($launcher.FullName, [ref]$null, [ref]$errors)
          if ($errors) {
            throw $errors[0]
          }

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/unica-codex-marketplace-${{ matrix.target }}.tar.gz" \
            "dist/unica-codex-marketplace-${{ matrix.target }}.zip" \
            --clobber

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: verify-source

    steps:
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Release ${GITHUB_REF_NAME}"

      - name: Skip release creation for branches
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: echo "Release creation is only needed for tag runs."

  installer:
    name: Publish installer script
    runs-on: ubuntu-latest
    needs:
      - verify-source
      - create-release

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - name: Stage installer
        run: |
          mkdir -p dist
          cp scripts/install-unica.sh dist/install-unica.sh
          cp scripts/install-unica.ps1 dist/install-unica.ps1

      - name: Publish installer asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/install-unica.sh \
            dist/install-unica.ps1 \
            --clobber
