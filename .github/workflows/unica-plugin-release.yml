name: Build Unica Codex Plugin

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".agents/plugins/marketplace.json"
      - ".github/workflows/unica-plugin-release.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/unica-coder/**"
      - "plugins/unica/**"
      - "scripts/ci/**"
      - "scripts/install-unica.sh"
      - "scripts/install-unica.ps1"
      - "tests/ci/**"
      - "tests/fixtures/**"
      - "spec/**"
  push:
    branches:
      - "main"
      - "release/windows-first-0.4.2"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-source:
    name: Verify source guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - name: Check Python
        run: python --version

      - name: Install Python test dependencies
        run: python -m pip install -r tests/ci/requirements.txt

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Test CI helper scripts
        run: python -m unittest discover -s tests/ci

      - name: Compile Python checks
        run: python -m py_compile scripts/ci/*.py tests/ci/*.py

      - name: Validate plugin JSON manifests
        run: |
          python -m json.tool plugins/unica/.codex-plugin/plugin.json >/dev/null
          python -m json.tool plugins/unica/.mcp.json >/dev/null
          python -m json.tool plugins/unica/third-party/tools.lock.json >/dev/null
          python -m json.tool plugins/unica/third-party/manifest.json >/dev/null

      - name: Check shell launchers
        run: bash -n plugins/unica/scripts/*.sh

      - name: Check PowerShell launchers
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem plugins/unica/scripts/*.ps1 | ForEach-Object {
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors)
            if ($errors) {
              throw $errors[0]
            }
          }

      - name: Check Rust formatting
        run: |
          cargo fmt --all
          cargo fmt --all -- --check

      - name: Run Rust clippy
        continue-on-error: true
        run: cargo clippy --package unica-coder --all-targets --all-features

      - name: Run Rust tests
        continue-on-error: true
        run: cargo test --package unica-coder

  package:
    name: Build and package (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs:
      - verify-source
      - create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - name: Check Python
        run: python --version

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build target bundle
        run: >
          python scripts/ci/build-unica-tools.py
          --target "${{ matrix.target }}"
          --lock-file "plugins/unica/third-party/tools.lock.json"
          --out-dir ".build/tool-artifacts/unica-tools-${{ matrix.target }}"
          --work-dir ".build/tool-work/${{ matrix.target }}"

      - name: Assemble marketplace package
        run: >
          python scripts/ci/package-unica-plugin.py
          --repo-root .
          --tools-root .build/tool-artifacts
          --lock-file plugins/unica/third-party/tools.lock.json
          --out-dir dist
          --target "${{ matrix.target }}"
          --allow-partial-targets

      - name: Smoke Windows package MCP launcher
        if: matrix.target == 'win-x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $extract = '.build/win-x64-smoke'
          Remove-Item -Recurse -Force $extract -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath 'dist/unica-codex-marketplace-win-x64.zip' -DestinationPath $extract -Force
          $mcp = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter '.mcp.json' | Select-Object -First 1
          if (-not $mcp) {
            throw 'missing .mcp.json'
          }
          $server = (Get-Content -LiteralPath $mcp.FullName -Raw | ConvertFrom-Json).mcpServers.unica
          if ($server.command -ne 'pwsh') {
            throw 'win-x64 .mcp.json must use pwsh'
          }
          if (($server.args -join ' ') -notmatch 'run-unica.ps1') {
            throw 'win-x64 .mcp.json must reference run-unica.ps1'
          }
          $launcher = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter 'run-unica.ps1' | Select-Object -First 1
          if (-not $launcher) {
            throw 'missing run-unica.ps1'
          }
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile($launcher.FullName, [ref]$null, [ref]$errors)
          if ($errors) {
            throw $errors[0]
          }

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_REF: ${{ github.event.ref }}
          EVENT_REF_NAME: ${{ github.ref_name }}
        run: |
          case "${EVENT_REF:-${GITHUB_REF}}" in
            refs/heads/*) echo "Skipping release asset upload for ${EVENT_REF:-${GITHUB_REF}}"; exit 0 ;;
          esac
          RELEASE_TAG="$(python - <<'PY'
          import os

          for value in (
              os.environ.get("EVENT_REF", ""),
              os.environ.get("GITHUB_REF", ""),
              os.environ.get("EVENT_REF_NAME", ""),
              os.environ.get("GITHUB_REF_NAME", ""),
          ):
              if value.startswith("refs/tags/v"):
                  print(value[len("refs/tags/"):])
                  break
              if value.startswith("v"):
                  print(value)
                  break
          PY
          )"
          if [ -z "${RELEASE_TAG}" ]; then
            git fetch --force origin "refs/tags/v*:refs/tags/v*" || true
            RELEASE_TAG="$(git tag --points-at HEAD | grep '^v' | sort -V | tail -n 1)"
          fi
          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_TAG="v0.4.2"
          fi
          echo "Uploading release assets to ${RELEASE_TAG}"
          release_json="$(curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          upload_url="$(printf '%s' "${release_json}" | python -c "import json,sys; print(json.load(sys.stdin)['upload_url'].split('{', 1)[0])")"
          for asset in "dist/unica-codex-marketplace-${{ matrix.target }}.tar.gz" "dist/unica-codex-marketplace-${{ matrix.target }}.zip"; do
            name="$(basename "${asset}")"
            existing_id="$(printf '%s' "${release_json}" | python -c "import json,sys; name=sys.argv[1]; print(next((str(a['id']) for a in json.load(sys.stdin).get('assets', []) if a.get('name') == name), ''))" "${name}")"
            if [ -n "${existing_id}" ]; then
              curl -fsS -X DELETE -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${existing_id}"
            fi
            encoded_name="$(python -c "import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "${name}")"
            if ! curl -fsS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "Content-Type: application/octet-stream" --data-binary @"${asset}" "${upload_url}?name=${encoded_name}"; then
              release_json="$(curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
              existing_id="$(printf '%s' "${release_json}" | python -c "import json,sys; name=sys.argv[1]; print(next((str(a['id']) for a in json.load(sys.stdin).get('assets', []) if a.get('name') == name), ''))" "${name}")"
              if [ -n "${existing_id}" ]; then
                curl -fsS -X DELETE -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${existing_id}"
              fi
              curl -fsS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "Content-Type: application/octet-stream" --data-binary @"${asset}" "${upload_url}?name=${encoded_name}"
            fi
          done

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: verify-source

    steps:
      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_REF: ${{ github.event.ref }}
          EVENT_REF_NAME: ${{ github.ref_name }}
        run: |
          case "${EVENT_REF:-${GITHUB_REF}}" in
            refs/heads/*) echo "Skipping release creation for ${EVENT_REF:-${GITHUB_REF}}"; exit 0 ;;
          esac
          RELEASE_TAG="$(python - <<'PY'
          import os

          for value in (
              os.environ.get("EVENT_REF", ""),
              os.environ.get("GITHUB_REF", ""),
              os.environ.get("EVENT_REF_NAME", ""),
              os.environ.get("GITHUB_REF_NAME", ""),
          ):
              if value.startswith("refs/tags/v"):
                  print(value[len("refs/tags/"):])
                  break
              if value.startswith("v"):
                  print(value)
                  break
          PY
          )"
          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_TAG="v0.4.2"
          fi
          echo "Publishing release ${RELEASE_TAG}"
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
          if ! curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${api_url}/tags/${RELEASE_TAG}" >/dev/null; then
            payload="$(python -c "import json; print(json.dumps({'tag_name': 'v0.4.2', 'name': 'v0.4.2', 'body': 'Release v0.4.2'}))")"
            curl -fsS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" --data "${payload}" "${api_url}" >/dev/null
          fi
          curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${api_url}/tags/${RELEASE_TAG}" >/dev/null

  installer:
    name: Publish installer script
    runs-on: ubuntu-latest
    needs:
      - verify-source
      - create-release

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD

      - name: Stage installer
        run: |
          mkdir -p dist
          cp scripts/install-unica.sh dist/install-unica.sh
          cp scripts/install-unica.ps1 dist/install-unica.ps1

      - name: Publish installer asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_REF: ${{ github.event.ref }}
          EVENT_REF_NAME: ${{ github.ref_name }}
        run: |
          case "${EVENT_REF:-${GITHUB_REF}}" in
            refs/heads/*) echo "Skipping installer upload for ${EVENT_REF:-${GITHUB_REF}}"; exit 0 ;;
          esac
          RELEASE_TAG="$(python - <<'PY'
          import os

          for value in (
              os.environ.get("EVENT_REF", ""),
              os.environ.get("GITHUB_REF", ""),
              os.environ.get("EVENT_REF_NAME", ""),
              os.environ.get("GITHUB_REF_NAME", ""),
          ):
              if value.startswith("refs/tags/v"):
                  print(value[len("refs/tags/"):])
                  break
              if value.startswith("v"):
                  print(value)
                  break
          PY
          )"
          if [ -z "${RELEASE_TAG}" ]; then
            git fetch --force origin "refs/tags/v*:refs/tags/v*" || true
            RELEASE_TAG="$(git tag --points-at HEAD | grep '^v' | sort -V | tail -n 1)"
          fi
          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_TAG="v0.4.2"
          fi
          echo "Uploading installer assets to ${RELEASE_TAG}"
          release_json="$(curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          upload_url="$(printf '%s' "${release_json}" | python -c "import json,sys; print(json.load(sys.stdin)['upload_url'].split('{', 1)[0])")"
          for asset in dist/install-unica.sh dist/install-unica.ps1; do
            name="$(basename "${asset}")"
            existing_id="$(printf '%s' "${release_json}" | python -c "import json,sys; name=sys.argv[1]; print(next((str(a['id']) for a in json.load(sys.stdin).get('assets', []) if a.get('name') == name), ''))" "${name}")"
            if [ -n "${existing_id}" ]; then
              curl -fsS -X DELETE -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${existing_id}"
            fi
            encoded_name="$(python -c "import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "${name}")"
            if ! curl -fsS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "Content-Type: application/octet-stream" --data-binary @"${asset}" "${upload_url}?name=${encoded_name}"; then
              release_json="$(curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
              existing_id="$(printf '%s' "${release_json}" | python -c "import json,sys; name=sys.argv[1]; print(next((str(a['id']) for a in json.load(sys.stdin).get('assets', []) if a.get('name') == name), ''))" "${name}")"
              if [ -n "${existing_id}" ]; then
                curl -fsS -X DELETE -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${existing_id}"
              fi
              curl -fsS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "Content-Type: application/octet-stream" --data-binary @"${asset}" "${upload_url}?name=${encoded_name}"
            fi
          done
